{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRMS | Edit Student</title>
    <link rel="stylesheet" href="{% static 'modern_ui.css' %}">
</head>
<body>
<div class="page-shell">
    <div class="container">
        <header class="site-header">
            <div class="site-header-inner">
                <a class="brand" href="{% url 'base' %}">
                    <span class="brand-mark"><img src="{% static 'jntuh_logo.png' %}" alt="SRMS"></span>
                    <span>SRMS Admin</span>
                </a>
                <nav class="nav-links" aria-label="Admin Navigation">
                    <a class="nav-link" href="{% url 'admin_page' %}">Dashboard</a>
                    <a class="nav-link active" href="{% url 'display_students' %}">Students</a>
                    <a class="nav-link" href="{% url 'manage_results' %}">Results</a>
                </nav>
            </div>
        </header>

        <main class="main-stack">
            <section class="panel">
                <span class="badge">Students</span>
                <h2>Edit Student Record</h2>
                <p class="panel-subtitle">Update fields and save changes.</p>
                <form method="POST" class="form-grid">
                    {% csrf_token %}
                    {{ form6.as_p }}
                    <div class="form-actions">
                        <button class="btn btn-primary" type="submit">Update</button>
                        <a class="btn btn-secondary" href="{% url 'display_students' %}">Back</a>
                    </div>
                </form>
            </section>
        </main>

        {% include "partials/site_footer.html" %}
    </div>
</div>
</body>
</html>
